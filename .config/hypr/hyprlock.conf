$font = Moralerspace Krypton HWJPDOCNF

general {
  hide_cursor = true
}

animations {
  enabled   = true
  bezier    = linear, 1, 1, 0, 0
  animation = fadeIn,         1, 1,  linear
  animation = fadeOut,        1, 1,  linear
  animation = inputFieldDots, 1, 2, linear
}

background {
  monitor     =
  path        = screenshot
  blur_passes = 2
}

input-field {
  monitor  =
  size     = 20%, 5%
  position = 0, -20
  halign   = center
  valign   = center

  inner_color       = rgba(0, 0, 0, 0.0) # no fill
  outer_color       = rgba(33ccffee) rgba(00ff99ee) 45deg
  check_color       = rgba(00ff99ee) rgba(ff6633ee) 120deg
  fail_color        = rgba(ff6633ee) rgba(ff0066ee) 40deg
  font_color        = rgb(143, 143, 143)
  fade_on_empty     = false

  rounding          = 2
  outline_thickness = 2

  font_family      = $font
  placeholder_text = 
  fail_text        = $PAMFAIL

  dots_size    = 0.2
  dots_spacing = 0.4
}

# TIME
label {
  monitor     =
  text        = $TIME # ref. https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#variable-substitution
  font_size   = 90
  font_family = $font

  position = -30, 0
  halign   = right
  valign   = top
}

# DATE
label {
  monitor     =
  text        = cmd[update:60000] date +"%Y-%m-%d (%a)" # update every 60 seconds
  font_size   = 28
  font_family = $font

  position = -30, -150
  halign   = right
  valign   = top
}

